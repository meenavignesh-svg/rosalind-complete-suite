<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rosalind Complete Suite</title>
  <style>
    :root { color-scheme: dark; --bg: #07110d; --panel: #101a16; --text: #f2f7f4; --muted: #a8b8af; --line: #22352d; --emerald: #50C878; --emerald-2: #059669; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    main { width: min(980px, calc(100% - 32px)); margin: 0 auto; padding: 56px 0; }
    header { border-bottom: 1px solid var(--line); padding-bottom: 28px; margin-bottom: 32px; }
    h1 { margin: 0 0 12px; font-size: clamp(2rem, 5vw, 4rem); line-height: 1; letter-spacing: 0; }
    h2 { margin: 0 0 16px; font-size: 1.35rem; }
    p { color: var(--muted); max-width: 760px; }
    a { color: var(--emerald); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    .card { border: 1px solid var(--line); border-radius: 8px; background: var(--panel); padding: 20px; }
    .tag { display: inline-flex; align-items: center; min-height: 28px; padding: 2px 10px; border: 1px solid rgba(80, 200, 120, .55); color: var(--emerald); border-radius: 999px; font-size: .85rem; }
    .meta { color: var(--muted); font-size: .95rem; }
  </style>
</head>
<body>
  <main>
    <header>
      <span class="tag">Python Village</span>
      <h1>Rosalind Complete Suite</h1>
      <p>A live portfolio of Rosalind problems, answers, explanations, and engineering complexity notes.</p>
    </header>

    <section>
      <h2>Completed Problems</h2>
      <div class="grid">
        <article class="card">
          <div class="tag">INI1</div>
          <h2><a href="python-village/INI1/">Installing Python</a></h2>
          <p class="meta">Answer documents: 1</p>
          <p>Run Python's built-in <code>import this</code> command and record the Zen of Python output.</p>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
